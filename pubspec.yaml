name: college_bus_app
description: A Realtime Bus Tracking System Flutter project.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # GPS location
  geolocator: ^10.1.0

  # Google Maps
  google_maps_flutter: ^2.6.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_database: ^10.4.0
  firebase_auth: ^4.17.0

  # Route drawing
  flutter_polyline_points: ^2.0.0

  # QR generation
  qr_flutter: ^4.1.0

  # QR scanning
  mobile_scanner: ^3.5.2

  # iOS icons
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4

  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/bus_icon.png
    
flutter_launcher_icons:
  android: true
  image_path: "assets/icon.png"